<!DOCTYPE html>
<html lang="es">

<head>

    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">

    <title>Rifa para la Recuperación de Daniel</title>

    <link rel="icon" type="image/png" href="favicon.png.jpeg">

    <link rel="preconnect" href="https://fonts.googleapis.com">

    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>

    <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@400;500;600;700&display=swap" rel="stylesheet">

    <link rel="stylesheet" href="style.css">

</head>

<body>

<div class="contenedor">

    <header class="encabezado">

        <h1>🏆 RIFA PARA LA RECUPERACIÓN DE DANIEL</h1>

        <p class="subtitulo">
            Ayúdanos participando en esta rifa solidaria.
        </p>

    </header>

    <section class="info-rifa">

        <div class="dato">

            <span class="titulo">🏆 Premio</span>

            <span class="valor">$5.000.000</span>

        </div>

        <div class="dato">

            <span class="titulo">🎟 Valor de la boleta</span>

            <span class="valor">$80.000</span>

        </div>

        <div class="dato">

            <span class="titulo">🎲 Sorteo</span>

            <span class="descripcion">

                Juega con los últimos <b>3 dígitos</b> del número ganador de la
                <b>Lotería Sinuano Noche</b> del <b>30 de agosto</b>.

            </span>

        </div>

    </section>

    <section class="estadisticas">

        <div class="estadistica">

            <div class="numero" id="disponibles"></div>

        </div>

        <div class="estadistica">

            <div class="numero" id="reservadas"></div>

        </div>

        <div class="estadistica">

            <div class="numero" id="vendidas"></div>

        </div>

    </section>

    <div class="acciones">

        <button id="descargar">

            📸 Descargar tablero

        </button>

    </div>

    <div id="tablero"></div>

</div>

<!-- MODAL -->

<div id="modal" class="modal">

    <div class="modal-contenido">

        <h2 id="tituloBoleta"></h2>

        <p>

            ¿Deseas comprar esta boleta?

        </p>

        <button id="comprarBtn">

            Comprar por WhatsApp

        </button>

        <button id="cancelarBtn">

            Cancelar

        </button>

    </div>

</div>

<script src="app.js"></script>

</body>

</html>
